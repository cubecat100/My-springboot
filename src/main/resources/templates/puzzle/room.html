<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${room.roomName}">&#xD37C;&#xC990; &#xD480;&#xC774;&#xBC29;</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/puzzle.css}">
</head>
<body>
    <header class="site-header">
        <div class="header-left">
            <a class="text-home-link" th:href="@{/}">&#xD37C;&#xC990; &#xD22C;&#xAC8C;&#xB354;</a>
            <p class="logo-copy" th:text="|${puzzleType.title} > ${room.roomName}|">&#xD37C;&#xC990; &#xD480;&#xC774;&#xBC29;</p>
        </div>

        <div class="header-right">
            <span class="guest-badge" th:text="${guestNickname}">guest-0001</span>
        </div>
    </header>

    <main class="content">
        <section class="hero hero-puzzle">
            <span class="eyebrow">3&#xB2E8;&#xACC4;</span>
            <h1 th:text="${room.roomName}">&#xCD08;&#xBCF4; &#xD658;&#xC601; &#xB85C;&#xC9C1;&#xBC29;</h1>
            <p th:text="${room.roomDescription}">&#xBC29; &#xC124;&#xBA85;</p>

            <div class="room-meta-row">
                <span class="status-chip" th:text="${room.statusLabel}">&#xBAA8;&#xC9D1; &#xC911;</span>
                <span class="capacity-copy" th:text="|${room.currentPlayers} / ${room.maxPlayers}명 참여 중|">2 / 4명 참여 중</span>
            </div>
        </section>

        <section class="room-layout">
            <article class="room-panel">
                <h2>&#xD611;&#xC5C5; &#xC601;&#xC5ED;</h2>
                <p>&#xB2E4;&#xC74C; &#xB2E8;&#xACC4;&#xC5D0;&#xC11C; &#xC2E4;&#xC2DC;&#xAC04; &#xD37C;&#xC990;&#xD310;, &#xCC44;&#xD305;, &#xD0C0;&#xC774;&#xBA38;, &#xC815;&#xB2F5; &#xC81C;&#xCD9C; UI&#xB97C; &#xBD99;&#xC77C; &#xC218; &#xC788;&#xC2B5;&#xB2C8;&#xB2E4;.</p>
                <div class="placeholder-board">
                    <span>PUZZLE BOARD</span>
                </div>
            </article>

            <article class="room-panel">
                <h2>&#xAD8C;&#xC7A5; &#xC5ED;&#xD560;</h2>
                <ul class="role-list">
                    <li th:each="role : ${suggestedRoles}" th:text="${role}">&#xB2E8;&#xC11C; &#xC815;&#xB9AC;</li>
                </ul>

                <div class="room-actions">
                    <a class="secondary-link-button" th:href="@{|/puzzles/${puzzleType.code}|}">&#xBAA9;&#xB85D;&#xC73C;&#xB85C;</a>
                    <button class="ghost-button" type="button">&#xC900;&#xBE44; &#xD1A0;&#xAE00; &#xC608;&#xC815;</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
